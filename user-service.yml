server:
  port: 8083

spring:

  datasource:
    url: jdbc:mysql://localhost:3306/user_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true


eureka:

  instance:
    hostname: localhost
    prefer-ip-address: true

  client:

    service-url:

      defaultZone: http://localhost:8761/eureka/
