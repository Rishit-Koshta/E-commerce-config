server:
  port: 8083

spring:

  datasource:
    url: jdbc:mysql://localhost:3306/user_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true


eureka:

  instance:
    hostname: localhost
    prefer-ip-address: true

  client:

    service-url:

      defaultZone: http://localhost:8761/eureka/

management:

  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

  endpoints:
    web:
      exposure:
        include: "*"
