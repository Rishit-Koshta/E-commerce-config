server:
  port: 8080


spring:

  application:
    name: api-gateway


  cloud:

    gateway:

      server:

        webmvc:

          routes:

            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/orders/**


            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/users/**


            - id: inventory-service
              uri: lb://inventory-service
              predicates:
                - Path=/inventory/**


eureka:

  client:

    service-url:

      defaultZone: http://localhost:8761/eureka/
