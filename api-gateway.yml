server:
  port: 8080


spring:

  application:
    name: api-gateway


  cloud:

    gateway:

      server:

        webmvc:

          routes:

            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/orders/**


            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/users/**


            - id: inventory-service
              uri: lb://inventory-service
              predicates:
                - Path=/inventory/**


eureka:

  instance:
    hostname: localhost
    prefer-ip-address: true

  client:

    service-url:

      defaultZone: http://localhost:8761/eureka/

management:

  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

  endpoints:
    web:
      exposure:
        include: "*"

logging:

  pattern:

    level: "%5p [%X{traceId:-},%X{spanId:-}]"
